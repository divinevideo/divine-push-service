# Builds once, pushes to all GCP Artifact Registry environments via docker-push-gcp.
# Production push only on version tags (v*). Dispatch to IAC repo triggers ArgoCD sync.
#
# Required GitHub Variables (repo-level):
#   Per environment: WORKLOAD_IDENTITY_PROVIDER_{ENV}, SERVICE_ACCOUNT_{ENV}, GCP_PROJECT_ID_{ENV}
#
# Required GitHub Secrets (staging environment):
#   CORECONFIG_DISPATCH_APP_ID, CORECONFIG_DISPATCH_APP_PRIVATE_KEY

name: Build, Test & Push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_production:
        description: 'Also push to production registry'
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  GCP_REGION: us-central1

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s
        ports:
          - 6379:6379
    env:
      CI: true
      RUST_LOG: debug

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Run tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          RUST_BACKTRACE: 1
        run: cargo test --verbose

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  docker:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      id-token: write
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.tags.outputs.tags }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: tags
        uses: divinevideo/divine-github-actions/generate-docker-tags@v1

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: divine-push-service:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push to POC
        uses: divinevideo/divine-github-actions/docker-push-gcp@v1
        with:
          image-name: divine-push-service:local
          registry-image: divine-push-service
          tags: ${{ steps.tags.outputs.tags }}
          wif-provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER_POC }}
          service-account: ${{ vars.SERVICE_ACCOUNT_POC }}
          project-id: ${{ vars.GCP_PROJECT_ID_POC }}
          repository: containers-poc
          region: ${{ env.GCP_REGION }}

      - name: Push to Test
        uses: divinevideo/divine-github-actions/docker-push-gcp@v1
        with:
          image-name: divine-push-service:local
          registry-image: divine-push-service
          tags: ${{ steps.tags.outputs.tags }}
          wif-provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER_TEST }}
          service-account: ${{ vars.SERVICE_ACCOUNT_TEST }}
          project-id: ${{ vars.GCP_PROJECT_ID_TEST }}
          repository: containers-test
          region: ${{ env.GCP_REGION }}

      - name: Push to Staging
        uses: divinevideo/divine-github-actions/docker-push-gcp@v1
        with:
          image-name: divine-push-service:local
          registry-image: divine-push-service
          tags: ${{ steps.tags.outputs.tags }}
          wif-provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER_STAGING }}
          service-account: ${{ vars.SERVICE_ACCOUNT_STAGING }}
          project-id: ${{ vars.GCP_PROJECT_ID_STAGING }}
          repository: containers-staging
          region: ${{ env.GCP_REGION }}

      - name: Push to Production
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.include_production)
        uses: divinevideo/divine-github-actions/docker-push-gcp@v1
        with:
          image-name: divine-push-service:local
          registry-image: divine-push-service
          tags: ${{ steps.tags.outputs.tags }}
          wif-provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER_PRODUCTION }}
          service-account: ${{ vars.SERVICE_ACCOUNT_PRODUCTION }}
          project-id: ${{ vars.GCP_PROJECT_ID_PRODUCTION }}
          repository: containers-production
          region: ${{ env.GCP_REGION }}

      - name: Summary
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** divine-push-service" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.tags.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environments:**" >> $GITHUB_STEP_SUMMARY
          echo "- POC: \`${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_POC }}/containers-poc/divine-push-service\`" >> $GITHUB_STEP_SUMMARY
          echo "- Test: \`${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_TEST }}/containers-test/divine-push-service\`" >> $GITHUB_STEP_SUMMARY
          echo "- Staging: \`${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_STAGING }}/containers-staging/divine-push-service\`" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || [[ "${{ inputs.include_production }}" == "true" ]]; then
            echo "- Production: \`${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_PRODUCTION }}/containers-production/divine-push-service\`" >> $GITHUB_STEP_SUMMARY
          fi

  deploy:
    name: Trigger Deploy
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: staging

    steps:
      - name: Determine environments
        id: envs
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || [[ "${{ inputs.include_production }}" == "true" ]]; then
            echo 'environments=["poc","test","staging","production"]' >> $GITHUB_OUTPUT
          else
            echo 'environments=["poc","test","staging"]' >> $GITHUB_OUTPUT
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CORECONFIG_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CORECONFIG_DISPATCH_APP_PRIVATE_KEY }}
          owner: divinevideo
          repositories: divine-iac-coreconfig

      - name: Trigger image deploy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          cat <<EOF | gh api repos/divinevideo/divine-iac-coreconfig/dispatches --input -
          {
            "event_type": "image-deploy",
            "client_payload": {
              "application": "divine-push-service",
              "environments": ${{ steps.envs.outputs.environments }},
              "images": [{"name": "divine-push-service", "tag": "${SHORT_SHA}"}],
              "source_repo": "${{ github.repository }}",
              "source_sha": "${{ github.sha }}",
              "source_ref": "${{ github.ref_name }}"
            }
          }
          EOF

          echo "## Deploy Dispatched" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Application | divine-push-service |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environments | ${{ steps.envs.outputs.environments }} |" >> $GITHUB_STEP_SUMMARY
