# Required GitHub Secrets (configured per environment):
#   Each environment (poc, test, staging, production) needs:
#   - GCP_PROJECT_ID: GCP project ID
#   - GCP_PROJECT_NUMBER: GCP project number (numeric)
#   - GCP_SERVICE_ACCOUNT: Service account email for Workload Identity
#   - GCP_WORKLOAD_IDENTITY_POOL: Workload Identity pool name
#   - GCP_WORKLOAD_IDENTITY_PROVIDER: Workload Identity provider name
#   - GCP_ARTIFACT_REPOSITORY: Repository path within project (e.g., containers-poc)
#
# Required GitHub Secrets (organization level, for coreconfig dispatch):
#   - CORECONFIG_DISPATCH_APP_ID: GitHub App ID for cross-repo dispatch
#   - CORECONFIG_DISPATCH_APP_PRIVATE_KEY: GitHub App private key
#
# GitHub Environments (configure at: Settings > Environments):
#   - poc: GCP secrets for POC registry push
#   - test: GCP secrets for Test registry push
#   - staging: GCP secrets for Staging registry push
#   - production: GCP secrets for Production registry push

name: Build, Test & Push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Environment to deploy to'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - poc
          - test
          - staging
          - production

env:
  CARGO_TERM_COLOR: always
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s
        ports:
          - 6379:6379
    env:
      CI: true
      RUST_LOG: debug
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Run tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          RUST_BACKTRACE: 1
        run: cargo test --verbose

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: divine-push-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-poc:
    name: Push to POC Registry
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    environment: poc
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.GCP_WORKLOAD_IDENTITY_POOL }}/providers/${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tags
        id: tags
        run: |
          FULL_IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/divine-push-service"
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tags=${FULL_IMAGE}:pr-${{ github.event.pull_request.number }}-ci" >> $GITHUB_OUTPUT
          else
            echo "tags=${FULL_IMAGE}:latest,${FULL_IMAGE}:${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-test:
    name: Push to Test Registry
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: test
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    outputs:
      pushed: ${{ steps.check.outputs.should_push }}

    steps:
      - name: Check if push is needed
        id: check
        run: |
          SHOULD_PUSH="false"
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            SHOULD_PUSH="true"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            DEPLOY_ENV="${{ github.event.inputs.deploy_environment }}"
            if [ "$DEPLOY_ENV" == "test" ] || [ "$DEPLOY_ENV" == "all" ]; then
              SHOULD_PUSH="true"
            fi
          fi
          echo "should_push=$SHOULD_PUSH" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        if: steps.check.outputs.should_push == 'true'

      - name: Authenticate to GCP
        if: steps.check.outputs.should_push == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.GCP_WORKLOAD_IDENTITY_POOL }}/providers/${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        if: steps.check.outputs.should_push == 'true'
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        if: steps.check.outputs.should_push == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.should_push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/divine-push-service:latest
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/divine-push-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-staging:
    name: Push to Staging Registry
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: staging
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    outputs:
      pushed: ${{ steps.check.outputs.should_push }}

    steps:
      - name: Check if push is needed
        id: check
        run: |
          SHOULD_PUSH="false"
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            SHOULD_PUSH="true"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            DEPLOY_ENV="${{ github.event.inputs.deploy_environment }}"
            if [ "$DEPLOY_ENV" == "staging" ] || [ "$DEPLOY_ENV" == "all" ]; then
              SHOULD_PUSH="true"
            fi
          fi
          echo "should_push=$SHOULD_PUSH" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        if: steps.check.outputs.should_push == 'true'

      - name: Authenticate to GCP
        if: steps.check.outputs.should_push == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.GCP_WORKLOAD_IDENTITY_POOL }}/providers/${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        if: steps.check.outputs.should_push == 'true'
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        if: steps.check.outputs.should_push == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.should_push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/divine-push-service:latest
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/divine-push-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-production:
    name: Push to Production Registry
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.GCP_WORKLOAD_IDENTITY_POOL }}/providers/${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/divine-push-service:${{ github.ref_name }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/divine-push-service:latest
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/divine-push-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dispatch-dev:
    name: Deploy to Dev Environments
    needs: [build, push-poc, push-test, push-staging]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build.result == 'success' &&
      needs.push-poc.result == 'success' &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_environment != 'production'))
    environment: staging

    steps:
      - name: Determine target environments
        id: envs
        run: |
          ENVS=()
          ENV_DISPLAY=()

          if [ "${{ needs.push-poc.result }}" == "success" ]; then
            ENVS+=("\"poc\"")
            ENV_DISPLAY+=("poc")
          fi

          if [ "${{ needs.push-test.outputs.pushed }}" == "true" ]; then
            ENVS+=("\"test\"")
            ENV_DISPLAY+=("test")
          fi

          if [ "${{ needs.push-staging.outputs.pushed }}" == "true" ]; then
            ENVS+=("\"staging\"")
            ENV_DISPLAY+=("staging")
          fi

          if [ "${{ github.event_name }}" == "push" ]; then
            echo "environments=[$(IFS=,; echo "${ENVS[*]}")]" >> $GITHUB_OUTPUT
            echo "env_display=$(IFS=', '; echo "${ENV_DISPLAY[*]}")" >> $GITHUB_OUTPUT
          else
            DEPLOY_ENV="${{ github.event.inputs.deploy_environment }}"
            if [ "$DEPLOY_ENV" == "all" ]; then
              echo "environments=[$(IFS=,; echo "${ENVS[*]}")]" >> $GITHUB_OUTPUT
              echo "env_display=$(IFS=', '; echo "${ENV_DISPLAY[*]}")" >> $GITHUB_OUTPUT
            elif [ "$DEPLOY_ENV" == "poc" ] && [ "${{ needs.push-poc.result }}" == "success" ]; then
              echo "environments=[\"poc\"]" >> $GITHUB_OUTPUT
              echo "env_display=poc" >> $GITHUB_OUTPUT
            elif [ "$DEPLOY_ENV" == "test" ] && [ "${{ needs.push-test.outputs.pushed }}" == "true" ]; then
              echo "environments=[\"test\"]" >> $GITHUB_OUTPUT
              echo "env_display=test" >> $GITHUB_OUTPUT
            elif [ "$DEPLOY_ENV" == "staging" ] && [ "${{ needs.push-staging.outputs.pushed }}" == "true" ]; then
              echo "environments=[\"staging\"]" >> $GITHUB_OUTPUT
              echo "env_display=staging" >> $GITHUB_OUTPUT
            else
              echo "::error::Requested environment '$DEPLOY_ENV' not available"
              exit 1
            fi
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CORECONFIG_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CORECONFIG_DISPATCH_APP_PRIVATE_KEY }}
          owner: divinevideo
          repositories: divine-iac-coreconfig

      - name: Dispatch image deploy to coreconfig
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cat <<EOF | gh api repos/divinevideo/divine-iac-coreconfig/dispatches --input -
          {
            "event_type": "image-deploy",
            "client_payload": {
              "application": "divine-push-service",
              "environments": ${{ steps.envs.outputs.environments }},
              "images": [{"name": "divine-push-service", "tag": "${{ github.sha }}"}],
              "source_repo": "${{ github.repository }}",
              "source_sha": "${{ github.sha }}",
              "source_ref": "${{ github.ref_name }}"
            }
          }
          EOF

          echo "## Deploy Dispatched" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Application | divine-push-service |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environments | ${{ steps.envs.outputs.env_display }} |" >> $GITHUB_STEP_SUMMARY

  dispatch-production:
    name: Deploy to Production
    needs: [build, push-production]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CORECONFIG_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CORECONFIG_DISPATCH_APP_PRIVATE_KEY }}
          owner: divinevideo
          repositories: divine-iac-coreconfig

      - name: Dispatch image deploy to coreconfig
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cat <<EOF | gh api repos/divinevideo/divine-iac-coreconfig/dispatches --input -
          {
            "event_type": "image-deploy",
            "client_payload": {
              "application": "divine-push-service",
              "environments": ["production"],
              "images": [{"name": "divine-push-service", "tag": "${{ github.sha }}"}],
              "source_repo": "${{ github.repository }}",
              "source_sha": "${{ github.sha }}",
              "source_ref": "${{ github.ref_name }}"
            }
          }
          EOF

          echo "## Deploy Dispatched to Production" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Application | divine-push-service |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
