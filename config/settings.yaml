# diVine Push Service - Production Configuration

nostr:
  relay_url: "wss://relay.divine.video"
  profile_relays:
    - wss://relay.divine.video
    - wss://purplepag.es
  profile_cache_ttl_secs: 300
  query_timeout_secs: 3

service:
  # Service's own keypair for NIP-42 auth and NIP-44 encryption
  # Load from env: NOSTR_PUSH__SERVICE__PRIVATE_KEY_HEX
  process_window_days: 7
  processed_event_ttl_secs: 604800  # 7 days
  # allowed_pubkeys: [] — empty means no restriction (production default)

redis:
  url: "redis://127.0.0.1:6379"  # Override with NOSTR_PUSH__REDIS__URL
  connection_pool_size: 10

app:
  name: "divine"
  package: "co.openvine.app"  # Historical - required for Firebase integration
  firebase:
    project_id: "openvine-co"
    # credentials_path: omitted — uses Application Default Credentials (GKE Workload Identity)

cleanup:
  enabled: true
  interval_secs: 86400  # Run once a day
  token_max_age_days: 90

notification:
  # Event kinds to subscribe to for notification triggers
  event_kinds:
    - 1      # Text notes (comments, mentions)
    - 3      # Contact list (follows)
    - 7      # Reactions/likes (NIP-25)
    - 16     # Generic reposts (NIP-18)
    - 30023  # Long-form content (mentions)
  # Default kinds users receive notifications for (can be customized via kind 3083)
  default_preferences:
    kinds:
      - 1      # Text notes (comments, mentions)
      - 3      # Contact list (follows)
      - 7      # Reactions/likes
      - 16     # Reposts
      - 30023  # Long-form content

server:
  listen_addr: "0.0.0.0:8000"
